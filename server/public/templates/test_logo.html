<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1a426b; }
  .logo {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .logo img {
    position: absolute;
    width: 70px;
    height: 70px;
    top: 5px;
    border-radius: 50%;
  }
  .logo svg {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 15px;
    left: 0;
    overflow: visible;
  }
  .logo-text {
    font-size: 20px;
    font-weight: 800;
    font-family: 'Outfit', sans-serif;
    fill: #ffffff;
    letter-spacing: 5px;
  }
  .logo-dot {
    fill: #ff4757;
  }
</style>
</head>
<body>
  <div class="logo">
    <img src="/static/favicon.png" alt="logo">
    <svg viewBox="0 0 120 120">
      <path id="curve" d="M 10 50 A 50 50 0 0 0 110 50" fill="transparent" stroke="red"/>
      <text class="logo-text">
        <textPath href="#curve" startOffset="50%" text-anchor="middle">bilal<tspan class="logo-dot">.</tspan></textPath>
      </text>
    </svg>
  </div>
</body>
</html>
